name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs of the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=999        # lint is best-effort: warnings don't block PRs

      - name: Build
        run: npm run build
        env:
          # CI-friendly defaults so the build doesn't try to contact Clerk etc.
          SITE_URL: https://motionix.xyz
          NEXT_PUBLIC_SITE_URL: https://motionix.xyz
