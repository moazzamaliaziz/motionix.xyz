    - generic [ref=e354]:
      - generic [ref=e355]:
        - paragraph [ref=e356]: FAQ
        - heading "What people ask." [level=2] [ref=e357]
      - list [ref=e358]:
        - listitem [ref=e359]:
          - button "Do I need an account?" [expanded] [ref=e360]:
            - generic [ref=e362]: +
          - paragraph [ref=e364]: No. Drop your file, get the result. We don't ask for an email. No signup wall greets you after your first task.
        - listitem [ref=e365]:
          - button "Does my file get uploaded?" [ref=e366]:
            - generic [ref=e368]: +
          - paragraph [ref=e370]: For the tools that can run in your browser — background removal, image compression, format conversion — your file stays on your device. Nothing on our servers. For tools that genuinely need a server (we have very few right now), we tell you that before you upload.
        - listitem [ref=e371]:
          - button "Are these tools accurate for passport photos?" [ref=e372]:
            - generic [ref=e374]: +
          - paragraph [ref=e376]: Our passport tool supports the four highest-volume country specs (US, UK, India, Schengen). We always recommend printing a low-stakes test before mailing the final photo. We don't replace the studio — we replace the photo-booth trip and the $15 fee.
        - listitem [ref=e377]:
          - button "Is the passport tool really free?" [ref=e378]:
            - generic [ref=e380]: +
          - paragraph [ref=e382]: Yes, in Phase 1. We may add a small payment option later for the print-ready high-resolution download (we charge under $5), but free preview is permanent.
        - listitem [ref=e383]:
          - button "What about my privacy?" [ref=e384]:
            - generic [ref=e386]: +
          - paragraph [ref=e388]: "Read the privacy page for the legal copy. The short version: we don't store media, we don't sell data, we don't show ads in tools, we don't track which image you uploaded. We track which tool you used and whether it completed successfully — that's how we know what's working."
        - listitem [ref=e389]:
          - button "Why is there no signup but tons of free stuff?" [ref=e390]:
            - generic [ref=e392]: +
          - paragraph [ref=e394]: Because ad-soup free sites are tiring. We let the tool talk for itself and we run on small ads in the log pages and tool explanations — not over your work.
        - listitem [ref=e395]:
          - button "Can I use my favourite browser?" [ref=e396]:
            - generic [ref=e398]: +
          - paragraph [ref=e400]: Chrome, Edge, Safari 16.4+, and Firefox 111+ all work. Safari on iOS works for everything except the video compressor (which we're rolling out in Phase 2).
        - listitem [ref=e401]:
          - button "Who builds this thing?" [ref=e402]:
            - generic [ref=e404]: +
          - paragraph [ref=e406]: A solo operator (me). Send nice notes via the contact page; I'll read them. Report a bug the same way.
