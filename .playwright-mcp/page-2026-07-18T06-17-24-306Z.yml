          - heading "Frequently asked." [level=2] [ref=f7e168]
          - list [ref=f7e169]:
            - listitem [ref=f7e170]:
              - button "Will my photo get rejected?" [expanded] [ref=f7e171]:
                - generic [ref=f7e173]: +
              - paragraph [ref=f7e175]: If you submit a sharp, well-lit face-forward photo with a plain background, our output follows the spec each consulate publishes. If you get rejected, email us the rejection reason and we&apos;ll tell you which rule you tripped.
            - listitem [ref=f7e176]:
              - button "Does it edit my face?" [ref=f7e177]:
                - generic [ref=f7e179]: +
              - paragraph [ref=f7e181]: Strict mode (the default for US / UK passports) does not edit a single pixel of your face — it only crops and places the existing image on a compliant white background. AI mode (resume / admission) lets you swap the background color.
            - listitem [ref=f7e182]:
              - button "Why is the US version so strict about backgrounds?" [ref=f7e183]:
                - generic [ref=f7e185]: +
              - paragraph [ref=f7e187]: The State Department banned AI-edited and digitally synthesized passport photos in 2025–26. We make sure strict mode isn&apos;t even touched by an AI — just handpicked rules from their published guidance.
            - listitem [ref=f7e188]:
              - button "Can I use this for visas?" [ref=f7e189]:
                - generic [ref=f7e191]: +
              - paragraph [ref=f7e193]: Yes — use the Schengen preset for any Schengen/EU visa. Other countries&apos; specs vary; we&apos;re adding more over time.
            - listitem [ref=f7e194]:
              - button "Do I need an account?" [ref=f7e195]:
                - generic [ref=f7e197]: +
              - paragraph [ref=f7e199]: No. We don&apos;t ask for an email and we don&apos;t log which country you chose.
            - listitem [ref=f7e200]:
              - button "What if my country isn&apos;t listed?" [ref=f7e201]:
                - generic [ref=f7e203]: +
              - paragraph [ref=f7e205]: Pick the closest spec — Schengen is a reasonable fallback for most ICAO-compliant docs. We add new countries based on requests.
